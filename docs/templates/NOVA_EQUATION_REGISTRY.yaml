      - name: n
        type: Nat
        unit: index
        range: "[0, infinity)"
      - name: F_n
        type: Float64
        unit: fibonacci_number
        range: "[1, infinity)"
      - name: F_n1
        type: Float64
        unit: fibonacci_number
        range: "[1, infinity)"
      - name: F_n2
        type: Float64
        unit: fibonacci_number
        range: "[1, infinity)"
      - name: phi_approx
        type: Float64
        unit: ratio
        range: "[1.0, 1.6180339887]"
      - name: convergence_depth
        type: Nat
        unit: fibonacci_steps
        range: "[12, infinity)"
    computation:
      formula: "F(n) = F(n-1) + F(n-2); lim[n→∞] F(n)/F(n-1) = 1.6180339887"
      symbols:
        phi: "1.6180339887 — golden ratio"
        phi_inv: "0.6180339887 — phi^(-1)"
        phi_inv_2: "0.3819660112 — phi^(-2)"
        phi_inv_3: "0.2360679774 — phi^(-3)"
